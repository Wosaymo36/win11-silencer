<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Win11 Silencer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+JP:wght@400;700&display=swap');

  :root {
    --bg: #0a0c0f;
    --surface: #111418;
    --surface2: #161b22;
    --border: #1e2530;
    --accent: #00e5ff;
    --accent2: #ff3c5a;
    --text: #c8d8e8;
    --dim: #7a8a9a;
    --green: #00ff99;
    --yellow: #ffd700;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    padding: 32px 16px;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
    pointer-events: none;
    z-index: 999;
  }

  .container { max-width: 760px; margin: 0 auto; }

  header { text-align: center; margin-bottom: 20px; }

  .logo {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(28px, 6vw, 48px);
    color: var(--accent);
    letter-spacing: 0.1em;
    text-shadow: 0 0 20px rgba(0,229,255,0.5), 0 0 60px rgba(0,229,255,0.2);
    animation: flicker 6s infinite;
  }
  .logo span { color: var(--accent2); }

  @keyframes flicker {
    0%,95%,100% { opacity:1; } 96% { opacity:0.85; } 97% { opacity:1; } 98% { opacity:0.9; }
  }

  .subtitle {
    font-family: 'Share Tech Mono', monospace;
    color: var(--dim); font-size: 12px;
    letter-spacing: 0.2em; margin-top: 8px;
    height: 1.5em;
  }

  .lang-switcher {
    display: flex; justify-content: center; gap: 8px; margin-top: 16px; margin-bottom: 30px;
  }
  .lang-btn {
    font-family: 'Share Tech Mono', monospace; font-size: 11px;
    padding: 4px 12px; border-radius: 2px; border: 1px solid var(--border);
    background: transparent; color: var(--dim); cursor: pointer; transition: all 0.2s;
  }
  .lang-btn:hover { border-color: var(--dim); }
  .lang-btn.active { background: rgba(0,229,255,0.12); border-color: var(--accent); color: var(--accent); }

  .format-bar {
    display: flex; align-items: center; gap: 8px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 2px; padding: 12px 18px; margin-bottom: 20px; flex-wrap: wrap;
  }
  .format-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px; color: var(--dim); letter-spacing: 0.15em; margin-right: 4px;
  }
  .fmt-btn {
    font-family: 'Share Tech Mono', monospace; font-size: 12px;
    padding: 5px 14px; border-radius: 2px; border: 1px solid var(--border);
    background: transparent; color: var(--dim); cursor: pointer; transition: all 0.15s;
  }
  .fmt-btn:hover { border-color: var(--accent); color: var(--accent); }
  .fmt-btn.active { background: rgba(0,229,255,0.12); border-color: var(--accent); color: var(--accent); }

  .section {
    background: var(--surface); border: 1px solid var(--border);
    border-left: 3px solid var(--accent); margin-bottom: 16px;
    border-radius: 2px; overflow: hidden; transition: border-color 0.2s;
  }
  .section:has(.item input[type="checkbox"]:checked) { border-left-color: var(--green); }

  .section-header {
    display: flex; align-items: center; padding: 14px 18px;
    user-select: none; gap: 12px;
  }
  .section-header:hover { background: rgba(255,255,255,0.02); }
  .section-title {
    font-family: 'Share Tech Mono', monospace; font-size: 13px;
    color: var(--accent); letter-spacing: 0.1em; flex: 1;
  }
  .section-risk {
    font-family: 'Share Tech Mono', monospace; font-size: 10px;
    padding: 2px 8px; border-radius: 2px; white-space: nowrap;
  }
  .risk-low  { background: rgba(0,255,153,0.1);  color: var(--green);   border: 1px solid rgba(0,255,153,0.3); }
  .risk-mid  { background: rgba(255,215,0,0.1);   color: var(--yellow);  border: 1px solid rgba(255,215,0,0.3); }
  .risk-high { background: rgba(255,60,90,0.1);   color: var(--accent2); border: 1px solid rgba(255,60,90,0.3); }

  .toggle-all-btn {
    font-family: 'Share Tech Mono', monospace; font-size: 10px;
    padding: 3px 10px; background: transparent; border: 1px solid var(--border);
    color: var(--dim); border-radius: 2px; cursor: pointer; transition: all 0.2s;
  }
  .toggle-all-btn:hover { border-color: var(--accent); color: var(--accent); }

  .section-body { padding: 0 18px 14px; }

  .item {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.03); cursor: pointer;
  }
  .item:last-child { border-bottom: none; }
  .item.p2p-container { cursor: default; flex-direction: column; gap: 0; }
  .p2p-top { display: flex; align-items: flex-start; gap: 12px; width: 100%; }

  .item input[type="checkbox"] {
    appearance: none; width: 16px; height: 16px; min-width: 16px;
    border: 1px solid var(--dim); background: transparent; cursor: pointer;
    position: relative; flex-shrink: 0; margin-top: 3px; transition: all 0.15s;
  }
  .item input[type="checkbox"]:checked { background: var(--accent); border-color: var(--accent); }
  .item input[type="checkbox"]:checked::after {
    content: ''; position: absolute; left: 4px; top: 1px;
    width: 5px; height: 9px; border: 2px solid #000;
    border-left: none; border-top: none; transform: rotate(45deg);
  }

  .item-info { flex: 1; }
  .item-name { font-size: 13px; font-weight: 700; color: #ddeeff; margin-bottom: 3px; }
  .item-desc { font-size: 11px; color: var(--dim); line-height: 1.5; }

  .p2p-options { display: none; margin-top: 10px; gap: 12px; flex-wrap: wrap; padding-left: 28px; }
  .p2p-options label {
    display: flex; align-items: center; gap: 8px;
    cursor: pointer; font-size: 12px; color: var(--text);
  }
  .p2p-options input[type="radio"] { accent-color: var(--accent); cursor: pointer; }
  .p2p-sub { color: var(--dim); font-size: 11px; }

  .actions { display: flex; gap: 12px; margin: 28px 0 16px; flex-wrap: wrap; }
  .btn {
    font-family: 'Share Tech Mono', monospace; font-size: 13px;
    letter-spacing: 0.1em; padding: 12px 24px; border-radius: 2px;
    border: none; cursor: pointer; transition: all 0.2s; flex: 1; min-width: 160px;
  }
  .btn-primary { background: var(--accent); color: #000; box-shadow: 0 0 20px rgba(0,229,255,0.3); }
  .btn-primary:hover:not(:disabled) { box-shadow: 0 0 30px rgba(0,229,255,0.5); transform: translateY(-1px); }
  .btn-primary:disabled { background: var(--dim); color: #333; box-shadow: none; cursor: default; transform: none; }
  .btn-secondary { background: transparent; color: var(--accent2); border: 1px solid var(--accent2); }
  .btn-secondary:hover { background: rgba(255,60,90,0.08); }
  .btn-outline { background: transparent; color: var(--dim); border: 1px solid var(--border); }
  .btn-outline:hover { border-color: var(--dim); color: var(--text); }

  .counter {
    font-family: 'Share Tech Mono', monospace; font-size: 12px;
    color: var(--dim); text-align: center; margin-bottom: 20px;
  }
  .counter strong { color: var(--accent); }

  #output-panel {
    margin-top: 28px; border: 1px solid var(--border);
    border-radius: 2px; overflow: hidden; display: none;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

  .output-header {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--surface2); padding: 10px 16px;
    border-bottom: 1px solid var(--border); gap: 12px; flex-wrap: wrap;
  }
  .output-title { font-family: 'Share Tech Mono', monospace; font-size: 12px; color: var(--accent); letter-spacing: 0.1em; }
  .output-meta { font-family: 'Share Tech Mono', monospace; font-size: 11px; color: var(--dim); }

  .copy-btn {
    font-family: 'Share Tech Mono', monospace; font-size: 12px;
    padding: 6px 18px; border-radius: 2px; border: 1px solid var(--accent);
    background: rgba(0,229,255,0.08); color: var(--accent);
    cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .copy-btn:hover { background: rgba(0,229,255,0.2); }
  .copy-btn.copied { border-color: var(--green); color: var(--green); background: rgba(0,255,153,0.08); }

  .output-instructions {
    background: rgba(0,229,255,0.03); border-bottom: 1px solid var(--border);
    padding: 10px 16px; font-size: 11px; color: var(--dim); line-height: 1.8;
  }
  .output-instructions strong { color: var(--accent); font-family: 'Share Tech Mono', monospace; }
  .step { display: flex; gap: 8px; }
  .step-num { font-family: 'Share Tech Mono', monospace; color: var(--accent); min-width: 20px; }

  #output-code {
    display: block; width: 100%; min-height: 200px; max-height: 480px;
    background: #080b0e; color: #a8c8e8; font-family: 'Share Tech Mono', monospace;
    font-size: 11.5px; line-height: 1.7; padding: 16px; border: none;
    outline: none; resize: vertical; overflow-y: auto; white-space: pre;
  }

  .warn-bar {
    background: rgba(255,60,90,0.06); border-top: 1px solid rgba(255,60,90,0.2);
    padding: 8px 16px; font-size: 11px; color: var(--accent2);
    font-family: 'Share Tech Mono', monospace;
  }
  .ai-disclaimer {
    background: rgba(255,255,255,0.02); border: 1px solid var(--border);
    padding: 12px; margin-top: 20px; font-size: 10px; color: var(--dim);
    line-height: 1.6; border-radius: 2px; text-align: left;
  }

  footer {
    text-align: center; margin-top: 40px; font-family: 'Share Tech Mono', monospace;
    font-size: 10px; color: var(--dim); letter-spacing: 0.2em;
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo">WIN11 <span>SILENCER</span></div>
    <div id="subtitle" class="subtitle"></div>
    <div class="lang-switcher">
      <button class="lang-btn" data-lang="ja">JP</button>
      <button class="lang-btn" data-lang="en">EN</button>
    </div>
  </header>

  <div class="format-bar">
    <span id="label-format" class="format-label"></span>
    <button class="fmt-btn" data-fmt="reg">.reg</button>
    <button class="fmt-btn" data-fmt="ps1">.ps1</button>
  </div>

  <div id="counter" class="counter"></div>
  <div id="sections-container"></div>

  <div class="actions">
    <button id="btn-select-all" class="btn btn-outline"></button>
    <button id="btn-generate" class="btn btn-primary" disabled></button>
    <button id="btn-clear" class="btn btn-secondary"></button>
  </div>

  <div id="output-panel">
    <div class="output-header">
      <span id="output-title" class="output-title"></span>
      <span id="output-meta" class="output-meta"></span>
      <button id="copy-btn" class="copy-btn"></button>
    </div>
    <div id="output-instructions" class="output-instructions"></div>
    <textarea id="output-code" readonly spellcheck="false"></textarea>
    <div id="warn-bar" class="warn-bar"></div>
  </div>

  <div id="ai-note" class="ai-disclaimer"></div>

  <footer>— win11 silencer — v2.0 —</footer>
</div>

<script>

      "Double-click the file, select 'Yes', then Restart your PC."

    ps1_steps: [
      "Click the Copy button.",
      "Search for 'PowerShell' in Start Menu → <span style=\"color:var(--accent)\">Right-click → Run as Administrator</span>",
      "Right-click inside the window to paste, then press Enter.",
      "Wait for completion, then Restart your PC."
    ]
  }

// --- FULL ITEMS DATA ---
const SECTIONS = [
  {
    id: 'ai', risk: 'mid', riskLabel: 'MEDIUM',
    title: { ja: '01 // Recall & Copilot & Windows AI', en: '01 // AI & Recall Control' },
    items: [
      { id: 'recall', 
        name: { ja: 'Recall (AIスクショ監視) 完全無効化', en: 'Disable Windows Recall' },

let lang = 'ja';
let currentFormat = 'reg';

function updateUI() {
  const t = UI_TEXT[lang];
  document.getElementById('subtitle').textContent = t.subtitle;
  document.getElementById('label-format').textContent = t.format;
  document.getElementById('btn-select-all').textContent = t.btn_selectAll;
  document.getElementById('btn-generate').textContent = t.btn_generate;
  document.getElementById('btn-clear').textContent = t.btn_clear;
  document.getElementById('copy-btn').textContent = t.copy;
  document.getElementById('warn-bar').textContent = t.warn_bar;
  document.getElementById('ai-note').textContent = t.ai_note;
  
  renderSections();
  updateCounter();
}

function renderSections() {
  const container = document.getElementById('sections-container');
  container.innerHTML = '';
  
  SECTIONS.forEach(sec => {
    const section = document.createElement('div');
    section.className = 'section';
    section.innerHTML = `
      <div class="section-header">
        <div class="section-title">${sec.title[lang]}</div>
        <span class="section-risk risk-${sec.risk}">${sec.riskLabel}</span>
        <button class="toggle-all-btn" onclick="toggleSec('${sec.id}')">${UI_TEXT[lang].selectAll}</button>
      </div>
      <div class="section-body" id="body-${sec.id}"></div>
    `;
    container.appendChild(section);
    
    const body = section.querySelector('.section-body');
    
    sec.items.forEach(item => {
      if (item.isP2P) {
        const row = document.createElement('div');
        row.className = 'item p2p-container';
        row.innerHTML = `
          <div class="p2p-top">
            <input type="checkbox" id="delivery_enable" style="margin-top:3px" onchange="toggleP2P()">
            <div class="item-info">
              <div class="item-name">${item.name[lang]}</div>
              <div class="item-desc">${item.desc[lang]}</div>
            </div>
          </div>
          <div class="p2p-options" id="p2p_options">
            <label><input type="radio" name="p2p_mode" value="disable" checked> 
              ${UI_TEXT[lang].p2p_off} <span class="p2p-sub">${UI_TEXT[lang].p2p_off_sub}</span>
            </label>
            <label><input type="radio" name="p2p_mode" value="lan"> 
              ${UI_TEXT[lang].p2p_lan} <span class="p2p-sub">${UI_TEXT[lang].p2p_lan_sub}</span>
            </label>
          </div>
        `;
        body.appendChild(row);
        return;
      }

      const label = document.createElement('label');
      label.className = 'item';
      label.innerHTML = `
        <input type="checkbox" id="${item.id}" onchange="updateCounter()">
        <div class="item-info">
          <div class="item-name">${item.name[lang]}</div>
          <div class="item-desc">${item.desc[lang]}</div>
        </div>
      `;
      body.appendChild(label);
    });
  });
}

function toggleP2P() {
  const cb = document.getElementById('delivery_enable');
  const opts = document.getElementById('p2p_options');
  if (opts) opts.style.display = cb && cb.checked ? 'flex' : 'none';
  updateCounter();
}

function toggleSec(id) {
  const cbs = document.querySelectorAll(`#body-${id} input[type="checkbox"]`);
  if(cbs.length === 0) return;
  const allChecked = [...cbs].every(c => c.checked);
  cbs.forEach(c => {
    c.checked = !allChecked;
    if(c.id === 'delivery_enable') toggleP2P();
  });
  updateCounter();
}

function updateCounter() {
  const all = document.querySelectorAll('input[type="checkbox"]:not([name="p2p_mode"])');
  const checked = [...all].filter(c => c.checked).length;
  document.getElementById('counter').innerHTML = UI_TEXT[lang].counter.replace('{count}', checked).replace('{total}', all.length);
  document.getElementById('btn-generate').disabled = checked === 0;
  
  document.querySelectorAll('.toggle-all-btn').forEach(btn => {
    const secId = btn.closest('.section').querySelector('.section-body').id.replace('body-', '');
    const secCbs = document.querySelectorAll(`#body-${secId} input[type="checkbox"]:not([name="p2p_mode"])`);
    const allSecChecked = [...secCbs].every(c => c.checked);
    btn.textContent = allSecChecked ? UI_TEXT[lang].deselectAll : UI_TEXT[lang].selectAll;
  });
}

function buildContent() {
  const now = new Date().toLocaleString(lang === 'ja' ? 'ja-JP' : 'en-US');
  let content = '';

  if (currentFormat === 'reg') {
    content += `Windows Registry Editor Version 5.00\n; Win11 Silencer — ${now}\n; Please Restart PC after applying\n\n`;
    SECTIONS.forEach(sec => {
      sec.items.forEach(item => {
        const cb = document.getElementById(item.id === 'delivery' ? 'delivery_enable' : item.id);
        if (cb && cb.checked) {
          if (item.isP2P) {
            const mode = document.querySelector('input[name="p2p_mode"]:checked')?.value || 'disable';
            const val = mode === 'disable' ? '00000063' : '00000001';
            content += `; ---- ${item.name[lang]} ----\n[HKEY_LOCAL_MACHINE\\SOFTWARE\\Policies\\Microsoft\\Windows\\DeliveryOptimization]\n"DODownloadMode"=dword:${val}\n"DOPercentageMaxUploadBandwidth"=dword:00000000\n\n`;
          } else {
            content += `; ---- ${item.name[lang]} ----\n${item.reg}\n\n`;
          }
        }
      });
    });
  } else {
    content += `# Win11 Silencer — ${now}\n# Run as Administrator in PowerShell\n\n`;
    SECTIONS.forEach(sec => {
      sec.items.forEach(item => {
        const cb = document.getElementById(item.id === 'delivery' ? 'delivery_enable' : item.id);
        if (cb && cb.checked) {
          if (item.isP2P) {
            const mode = document.querySelector('input[name="p2p_mode"]:checked')?.value || 'disable';
            const val = mode === 'disable' ? 99 : 1;
            content += `# ---- ${item.name[lang]} ----\nreg add "HKLM\\SOFTWARE\\Policies\\Microsoft\\Windows\\DeliveryOptimization" /v DODownloadMode /t REG_DWORD /d ${val} /f\nreg add "HKLM\\SOFTWARE\\Policies\\Microsoft\\Windows\\DeliveryOptimization" /v DOPercentageMaxUploadBandwidth /t REG_DWORD /d 0 /f\n\n`;
          } else {
            content += `# ---- ${item.name[lang]} ----\n${item.ps.join('\n')}\n\n`;
          }
        }
      });
    });
    content += `Write-Host "Complete. Please Restart your PC." -ForegroundColor Cyan\n`;
  }
  return content;
}

function generate() {
  document.getElementById('output-code').value = buildContent();
  document.getElementById('output-title').textContent = currentFormat === 'reg' ? '// .reg OUTPUT' : '// .ps1 OUTPUT';
  
  const all = document.querySelectorAll('input[type="checkbox"]:not([name="p2p_mode"])');
  const checkedCount = [...all].filter(c => c.checked).length;
  const now = new Date().toLocaleString(lang === 'ja' ? 'ja-JP' : 'en-US');
  document.getElementById('output-meta').textContent = `${checkedCount} items | ${now}`;
  
  const steps = currentFormat === 'reg' ? UI_TEXT[lang].reg_steps : UI_TEXT[lang].ps1_steps;
  document.getElementById('output-instructions').innerHTML = `<strong>${UI_TEXT[lang].inst_title}</strong>` + 
    steps.map((s, i) => `<div class="step"><span class="step-num">0${i+1}.</span><span>${s}</span></div>`).join('');
  
  const panel = document.getElementById('output-panel');
  panel.style.display = 'block';
  panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
  
  const btn = document.getElementById('copy-btn');
  btn.textContent = UI_TEXT[lang].copy;
  btn.classList.remove('copied');
}

// Event Listeners
document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    lang = btn.dataset.lang;
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b === btn));
    const wasPanelOpen = document.getElementById('output-panel').style.display === 'block';
    updateUI();
    // 状態を復元 (選択されているチェックボックス等)
    if(wasPanelOpen) generate();
  });
});

document.querySelectorAll('.fmt-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    currentFormat = btn.dataset.fmt;
    document.querySelectorAll('.fmt-btn').forEach(b => b.classList.toggle('active', b === btn));
    if (document.getElementById('output-panel').style.display === 'block') generate();
  });
});

document.getElementById('btn-select-all').addEventListener('click', () => {
  document.querySelectorAll('input[type="checkbox"]:not([name="p2p_mode"])').forEach(c => c.checked = true);
  toggleP2P();
});

document.getElementById('btn-clear').addEventListener('click', () => {
  document.querySelectorAll('input[type="checkbox"]:not([name="p2p_mode"])').forEach(c => c.checked = false);
  document.getElementById('output-panel').style.display = 'none';
  toggleP2P();
});

document.getElementById('btn-generate').addEventListener('click', generate);

document.getElementById('copy-btn').addEventListener('click', () => {
  navigator.clipboard.writeText(document.getElementById('output-code').value).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = UI_TEXT[lang].copied;
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = UI_TEXT[lang].copy; btn.classList.remove('copied'); }, 2000);
  });
});

// Init
document.querySelector('[data-lang="ja"]').classList.add('active');
updateUI();
</script>
</body>
</html>
